name: Django Status Page CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: status-page-app
  EKS_CLUSTER_NAME: yifat-avishag-roman-status-page-cluster
  IMAGE_TAG: v${{ github.run_number }}

jobs:
  plan:
    name: 'Lint & Terraform Plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run Linting (flake8)
        run: flake8 app/statuspage/ --max-line-length=120

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infrastructure/terraform
        env:
          TF_VAR_avishag_iam_arn: ${{ secrets.AVISHAG_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infrastructure/terraform
        env:
          TF_VAR_avishag_iam_arn: ${{ secrets.AVISHAG_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./infrastructure/terraform/tfplan
          retention-days: 1

  apply-and-deploy:
    name: 'Terraform Apply & App Deploy'
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./infrastructure/terraform/

      - name: Terraform Init
        working-directory: ./infrastructure/terraform
        env:
          TF_VAR_avishag_iam_arn: ${{ secrets.AVISHAG_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ./infrastructure/terraform
        run: terraform apply tfplan # Applies the downloaded plan without asking for auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Helm Chart values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ env.IMAGE_TAG }}\"/" helm/status-page/values.yaml

      - name: Commit and Push Updated Helm Chart
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add helm/status-page/values.yaml
          git commit -m "chore: update image tag to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Update EKS Kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install status-page ./helm/status-page --set image.tag=${{ env.IMAGE_TAG }}
