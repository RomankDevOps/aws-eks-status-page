apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "status-page.fullname" . }}
  labels:
    app: {{ include "status-page.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "status-page.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "status-page.name" . }}
    spec:
      containers:
        - name: status-page
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "status-page.fullname" . }}-env
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: django-secret-key
          volumeMounts:
            - name: django-config-volume
              mountPath: /app/statuspage/configuration.py
              subPath: configuration.py
          ports:
            - name: http
              containerPort: 8000
          # FIX: Added resource limits — prevents the Pod from consuming all Node memory/CPU
          resources:
            requests:
              cpu: "250m"       # 0.25 CPU cores minimum guaranteed
              memory: "256Mi"   # 256MB RAM minimum guaranteed
            limits:
              cpu: "500m"       # 0.5 CPU cores maximum allowed
              memory: "512Mi"   # 512MB RAM maximum allowed
          # FIX: Added livenessProbe — Kubernetes restarts the Pod if the app crashes/hangs
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30   # Wait 30s after start before first check
            periodSeconds: 15         # Check every 15 seconds
            failureThreshold: 3       # Restart after 3 consecutive failures
          # FIX: Added readinessProbe — Kubernetes only sends traffic when app is truly ready
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20   # Wait 20s before first readiness check
            periodSeconds: 10         # Check every 10 seconds
            failureThreshold: 3       # Remove from load balancing after 3 failures
      volumes:
        - name: django-config-volume
          configMap:
            name: django-config
