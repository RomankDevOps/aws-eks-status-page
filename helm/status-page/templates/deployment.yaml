apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "status-page.fullname" . }}
  labels:
    app: {{ include "status-page.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "status-page.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "status-page.name" . }}
    spec:
      containers:
        - name: status-page
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # --- Environment Variables ---
          env:
            {{- toYaml .Values.env | nindent 12 }}
          # --- Volume Mounts ---
          volumeMounts:
            - name: django-config-volume
              mountPath: /app/statuspage/configuration.py
              subPath: configuration.py
          ports:
            - containerPort: 80
      # --- Volumes ---
      volumes:
        - name: django-config-volume
          configMap:
            name: django-config
