replicaCount: 1

image:
  repository: 992382545251.dkr.ecr.us-east-1.amazonaws.com/status-page-app
  tag: "v54"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  - name: ALLOWED_HOSTS
    value: "*"
